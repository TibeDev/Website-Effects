<!doctype html>
<html lang="en">
  <head>
    <!-- #region Font import -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <!-- #endregion -->

    <!-- #region CSS import-->

    <!-- Basic style -->
    <link rel="stylesheet" href="./src/styling/style.css" />

    <!-- Cursor -->
    <link rel="stylesheet" href="./src/Cursor/cursor.css" />

    <!-- #endregion-->

    <div class="cursor" id="cursor" data-duration="0"></div>

    <span

      data-words="Tibe Van den Brande, Cool guy"

    <!-- #endregion-->

    <!-- #region Javascript Import   -->

    <!-- Scramble -->
    <script src="./src/Scramble/scramble.js"></script>

    <!-- Cursor -->
    <script src="./src/Cursor/cursor.js"></script>

    <!-- #endregion -->
  </body>
</html>
